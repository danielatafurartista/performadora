<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>Slot Machine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="notification" id="notification">
        <div class="title">BIG WIN!</div>
        <div class="body" id="notificationBody"></div>
      </div>
      <div class="app-content slot-machine">
        <header>
          <h1>La Performadora</h1>
        </header>
        <section class="machine-layout">
          <div class="reels-panel">
            <div class="reels" id="reels">
              <span class="runner-glow"></span>
              <div class="reel" data-index="0"></div>
              <div class="reel" data-index="1"></div>
              <div class="reel" data-index="2"></div>
            </div>
            <div class="message-area" id="messageArea">Presiona GIRAR para generar!</div>
            <div class="controls">
              <button id="spinButton">GIRAR</button>
            </div>
          </div>
          <aside class="status-panel">
            <div class="status-block">
              <strong>Credits</strong>
              <span class="status-value" id="creditsValue">0</span>
            </div>
            <div class="status-block">
              <strong>Last Win</strong>
              <span class="status-value" id="lastWinValue">0</span>
            </div>
            <div class="status-block">
              <strong>Bet / Spin</strong>
              <span class="status-value" id="betValue">10</span>
            </div>
            <div>
              <h3 class="status-title">Payouts • 3 of a kind</h3>
              <div class="payout-table" id="payoutTable"></div>
            </div>
            <div>
              <h3 class="status-title">Recent Spins</h3>
              <ul class="history-list" id="historyList">
                <li class="history-empty">No spins yet.</li>
              </ul>
            </div>
          </aside>
        </section>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
